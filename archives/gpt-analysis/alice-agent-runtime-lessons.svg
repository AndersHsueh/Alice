<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="对 ALICE 最有价值的 10 条可落地启发">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#101935" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d9ff" />
      <stop offset="100%" stop-color="#8b7bff" />
    </linearGradient>
    <style>
      .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #ecf2ff; }
      .subtitle { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #aab3d6; }
      .h { font: 700 17px "Segoe UI", Arial, sans-serif; fill: #ecf2ff; }
      .p { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #cdd6f4; }
      .muted { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #93a0c9; }
      .small { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #96a3cf; }
      .line { stroke: #3ac8ff; stroke-width: 2.5; stroke-linecap: round; opacity: 0.9; }
      .dash { stroke: #7283c7; stroke-width: 2; stroke-dasharray: 7 7; opacity: 0.9; }
      .panel { fill: #121a31; stroke: rgba(255,255,255,0.12); stroke-width: 1; }
      .core { fill: #151f3c; stroke: #00d9ff; stroke-width: 2; }
      .accent-box { fill: #121a31; stroke: #8b7bff; stroke-width: 1.6; }
      .warn-box { fill: #121a31; stroke: #ffd43b; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />

  <text x="60" y="60" class="title">对 ALICE 最有价值的 10 条可落地启发</text>
  <text x="60" y="88" class="subtitle">从 Claude Code 学的是“工程方法”，不是代码实现：围绕 Agent Runtime、上下文、恢复、权限和可观测性来组织系统。</text>

  <rect x="450" y="145" rx="18" ry="18" width="300" height="118" class="core" />
  <text x="600" y="185" text-anchor="middle" class="h">ALICE + VERONICA</text>
  <text x="600" y="212" text-anchor="middle" class="p">CLI / TUI 负责交互</text>
  <text x="600" y="232" text-anchor="middle" class="p">Daemon 负责会话 / 工具 / 调度</text>
  <text x="600" y="252" text-anchor="middle" class="small">目标：从“会调用模型”升级为“可治理 Agent Runtime”</text>

  <path d="M450 204 L275 204" class="line" />
  <path d="M750 204 L925 204" class="line" />
  <path d="M600 263 L600 340" class="line" />

  <rect x="70" y="130" rx="16" ry="16" width="180" height="150" class="panel" />
  <text x="160" y="165" text-anchor="middle" class="h">1-3 定义与边界</text>
  <text x="90" y="195" class="p">1. Agent 定义中心化</text>
  <text x="90" y="218" class="p">2. 默认继承，谨慎偏离</text>
  <text x="90" y="241" class="p">3. 特殊模式显式化</text>
  <text x="90" y="265" class="small">让系统结构先稳定，再扩能力</text>

  <rect x="950" y="130" rx="16" ry="16" width="180" height="150" class="panel" />
  <text x="1040" y="165" text-anchor="middle" class="h">4-6 运行时治理</text>
  <text x="970" y="195" class="p">4. 上下文隔离</text>
  <text x="970" y="218" class="p">5. 可恢复生命周期</text>
  <text x="970" y="241" class="p">6. 工具与权限重组</text>
  <text x="970" y="265" class="small">重点不是“能跑”，而是“跑稳”</text>

  <rect x="320" y="360" rx="16" ry="16" width="560" height="280" class="accent-box" />
  <text x="600" y="395" text-anchor="middle" class="h">7-10 产品化能力</text>

  <rect x="350" y="420" rx="12" ry="12" width="220" height="82" class="panel" />
  <text x="370" y="448" class="p">7. 分层记忆</text>
  <text x="370" y="470" class="small">user / project / local</text>
  <text x="370" y="490" class="small">知识和任务不要混写</text>

  <rect x="630" y="420" rx="12" ry="12" width="220" height="82" class="panel" />
  <text x="650" y="448" class="p">8. 缓存友好设计</text>
  <text x="650" y="470" class="small">稳定 prompt 前缀</text>
  <text x="650" y="490" class="small">把成本优化前移到架构</text>

  <rect x="350" y="530" rx="12" ry="12" width="220" height="82" class="panel" />
  <text x="370" y="558" class="p">9. 可观测性内建</text>
  <text x="370" y="580" class="small">agentId / taskId / summary / trace</text>
  <text x="370" y="600" class="small">先看得见，才管得住</text>

  <rect x="630" y="530" rx="12" ry="12" width="220" height="82" class="panel" />
  <text x="650" y="558" class="p">10. Agent 当任务单元</text>
  <text x="650" y="580" class="small">不是 prompt 花样</text>
  <text x="650" y="600" class="small">而是可治理的工作实体</text>

  <path d="M600 340 L600 360" class="dash" />

  <rect x="70" y="560" rx="16" ry="16" width="220" height="100" class="warn-box" />
  <text x="180" y="592" text-anchor="middle" class="h">建议执行顺序</text>
  <text x="92" y="620" class="small">1. 定义层</text>
  <text x="160" y="620" class="small">2. 上下文层</text>
  <text x="92" y="642" class="small">3. 生命周期</text>
  <text x="160" y="642" class="small">4. 观测层</text>

  <rect x="910" y="560" rx="16" ry="16" width="220" height="100" class="warn-box" />
  <text x="1020" y="592" text-anchor="middle" class="h">设计总原则</text>
  <text x="930" y="620" class="small">先约束边界，再提升智能</text>
  <text x="930" y="642" class="small">先保证恢复，再追求炫技</text>
</svg>
